<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BTCUSD Forecasting Dashboard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #fff8ef;
            --bg-soft: #fffdf9;
            --paper: #ffffff;
            --ink: #2f3346;
            --ink-muted: #666e85;
            --rose: #ff7b8a;
            --peach: #ffc88f;
            --mint: #67c6a6;
            --sky: #79b6ff;
            --border: #f0e7d9;
            --shadow: 0 10px 28px rgba(47, 51, 70, 0.08);
        }
        body {
            font-family: "Outfit", sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(circle at 10% 10%, rgba(255, 200, 143, 0.32), transparent 35%),
                radial-gradient(circle at 88% 14%, rgba(121, 182, 255, 0.26), transparent 32%),
                linear-gradient(180deg, var(--bg) 0%, #fff4ef 45%, var(--bg-soft) 100%);
        }
        h1, h2, h3, h4, h5, .navbar-brand {
            font-family: "Nunito", sans-serif;
            font-weight: 800;
        }
        .sidebar {
            min-height: 100vh;
            padding: 1.5rem 1.2rem;
            border-right: 1px solid var(--border);
            background: linear-gradient(180deg, #fff6ea 0%, #fffaf3 100%);
        }
        .brand-chip {
            border-radius: 14px;
            padding: 0.85rem 1rem;
            background: linear-gradient(135deg, #ffb977, #ff7b8a);
            color: #fff;
            box-shadow: var(--shadow);
        }
        .brand-chip small {
            opacity: 0.9;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .sidebar a {
            display: block;
            margin-top: 0.6rem;
            padding: 0.65rem 0.9rem;
            border-radius: 12px;
            color: var(--ink-muted);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .sidebar a:hover,
        .sidebar a.active {
            color: #fff;
            background: linear-gradient(135deg, #ff8e7b, #f56ea2);
            box-shadow: 0 8px 20px rgba(245, 110, 162, 0.22);
        }
        .main-wrap {
            padding: 1.7rem 1.2rem 2rem;
        }
        .card {
            border: 1px solid var(--border);
            border-radius: 18px;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            background: var(--paper);
            overflow: hidden;
        }
        .card-header {
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, #fffdfb 0%, #fff8f3 100%);
        }
        .stat-card {
            color: #fff;
            border: none;
        }
        .stat-card h5 { font-weight: 700; }
        .stat-peach { background: linear-gradient(135deg, #ffb477, #ff8d7c); }
        .stat-mint { background: linear-gradient(135deg, #58c7aa, #6ab5ff); }
        .stat-rose { background: linear-gradient(135deg, #ff7f95, #f29dc6); }
        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--ink);
            --bs-table-striped-bg: #fff8f2;
            --bs-table-striped-color: var(--ink);
            --bs-table-hover-bg: #fff4ec;
            --bs-table-border-color: var(--border);
        }
        .badge {
            border-radius: 999px;
            padding: 0.45rem 0.6rem;
            font-weight: 700;
        }
        .status-finished {
            color: #ffffff;
            background: linear-gradient(135deg, #74d9b6, #43b883);
            box-shadow: 0 6px 14px rgba(67, 184, 131, 0.28);
        }
        .status-other {
            color: #4a3a42;
            background: linear-gradient(135deg, #ffe2bf, #ffd1d8);
        }
        .status-alert {
            color: #ffffff;
            background: linear-gradient(135deg, #ff8ea1, #f75b87);
            box-shadow: 0 6px 14px rgba(247, 91, 135, 0.24);
        }
        .status-watch {
            color: #5f3f2a;
            background: linear-gradient(135deg, #ffd8a8, #ffc7c7);
            box-shadow: 0 6px 14px rgba(255, 174, 146, 0.24);
        }
        .status-stable {
            color: #ffffff;
            background: linear-gradient(135deg, #7ad9b8, #4ebd95);
            box-shadow: 0 6px 14px rgba(78, 189, 149, 0.24);
        }
        .btn-primary {
            border: none;
            background: linear-gradient(135deg, #ff997d, #f275a6);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #ff8a6a, #ea5c99);
        }
        .btn-outline-secondary {
            border-color: #efddcb;
            color: #7a6270;
        }
        .btn-outline-secondary:hover {
            border-color: #e6cab1;
            background: #fff4ea;
            color: #6f4e63;
        }
        @media (max-width: 768px) {
            .sidebar { min-height: auto; }
            .main-wrap { padding-top: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="brand-chip">
                    <h5 class="mb-1">BTC Forecasting</h5>
                    <small>Sweet Insights Dashboard</small>
                </div>
                <div class="mt-3">
                    <a class="{% if request.path == '/' %}active{% endif %}" href="/">Dashboard Overview</a>
                    <a class="{% if request.path == '/monitoring/' %}active{% endif %}" href="/monitoring/">Drift Monitoring</a>
                    <a class="{% if request.path == '/ab-testing/' %}active{% endif %}" href="/ab-testing/">A/B Testing</a>
                    <a class="{% if request.path == '/roi/' %}active{% endif %}" href="/roi/">ROI Analysis</a>
                </div>
            </nav>
            <main class="col-md-10 ms-sm-auto main-wrap">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
